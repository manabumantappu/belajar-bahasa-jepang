<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Manabu Mantappu</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}
*{
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  border:none;
  background:#1976d2;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

#error{
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Masuk</button>

  <p id="error"></p>
</div>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBslTLBKQumtxegU4-oAX294e-WI3V57Dg",
  authDomain: "manabu-mantappu-chat.firebaseapp.com",
  databaseURL: "https://manabu-mantappu-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "manabu-mantappu-chat",
  storageBucket: "manabu-mantappu-chat.firebasestorage.app",
  messagingSenderId: "108384734025",
  appId: "1:108384734025:web:10635bbd6b966d2dca6898"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

 conAuthStateChanged(auth, (user) => {
  if(user){
    window.location.href = "download.html";
  }
});
window.login = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

  window.location.href = "download.html";
    
  }catch(err){

    document.getElementById("error").innerText =
      err.message;

  }

};

</script>

</body>
</html>
