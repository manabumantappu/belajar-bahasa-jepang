<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Manabu Mantappu</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.login-box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
  box-shadow:0 0 15px rgba(0,0,0,.1);
}

h2{
  margin-top:0;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#1976d2;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  opacity:.9;
}

#error{
  color:red;
  margin-top:10px;
  text-align:center;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>🔑 Login Member</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

<button onclick="login()">Masuk</button>

  <p id="error"></p>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBslTLBKQumtxegU4-oAX294e-WI3V57Dg",
  authDomain: "manabu-mantappu-chat.firebaseapp.com",
  databaseURL: "https://manabu-mantappu-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "manabu-mantappu-chat",
  storageBucket: "manabu-mantappu-chat.firebasestorage.app",
  messagingSenderId: "108384734025",
  appId: "1:108384734025:web:10635bbd6b966d2dca6898"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Jika sudah login langsung ke Home
onAuthStateChanged(auth, (user) => {
  if(user){
    location.replace("index.html");
  }
});

window.login = async function(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    location.replace("index.html");

  }catch(err){

    document.getElementById("error").innerText =
      "Login gagal. Periksa email dan password.";

    console.error(err);
  }

};

</script>

</body>
</html>
